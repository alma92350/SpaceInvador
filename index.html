<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPACE INVADERS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>👾</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #ui {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header {
      display: flex;
      justify-content: space-between;
      width: 800px;
      padding: 6px 0;
      font-size: 11px;
    }

    #score-label { color: #0ff; text-shadow: 0 0 8px #0ff; }
    #score-val   { color: #fff; text-shadow: 0 0 6px #fff; }
    #level-label { color: #f0f; text-shadow: 0 0 8px #f0f; }
    #level-val   { color: #fff; text-shadow: 0 0 6px #fff; }
    #hi-label    { color: #ff0; text-shadow: 0 0 8px #ff0; }
    #hi-val      { color: #fff; text-shadow: 0 0 6px #fff; }
    #lives-label { color: #0f0; text-shadow: 0 0 8px #0f0; }
    #lives-val   { color: #fff; text-shadow: 0 0 6px #fff; }

    #gameCanvas {
      display: block;
      border: 2px solid #0ff;
      box-shadow: 0 0 20px #0ff, 0 0 60px rgba(0,255,255,0.3);
      image-rendering: pixelated;
    }

    #footer {
      width: 800px;
      padding: 6px 0;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #555;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 800px;
      height: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.85);
    }

    #overlay h1 {
      font-size: 28px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      animation: rainbow 2s linear infinite;
    }

    #overlay h2 {
      font-size: 16px;
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
      margin-bottom: 30px;
    }

    #overlay p {
      font-size: 10px;
      color: #aaa;
      margin: 6px 0;
      text-align: center;
    }

    #overlay .blink {
      font-size: 13px;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
      margin-top: 24px;
      animation: blink 0.8s step-end infinite;
    }

    #overlay .score-board {
      font-size: 10px;
      color: #0f0;
      text-shadow: 0 0 6px #0f0;
      margin: 4px 0;
    }

    #mute-btn {
      position: absolute;
      top: 4px;
      right: 8px;
      font-size: 8px;
      color: #555;
      cursor: pointer;
      z-index: 30;
      background: none;
      border: 1px solid #333;
      padding: 2px 6px;
      font-family: inherit;
    }
    #mute-btn:hover { color: #0ff; border-color: #0ff; }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes rainbow {
      0%   { color: #f00; text-shadow: 0 0 12px #f00; }
      16%  { color: #ff0; text-shadow: 0 0 12px #ff0; }
      33%  { color: #0f0; text-shadow: 0 0 12px #0f0; }
      50%  { color: #0ff; text-shadow: 0 0 12px #0ff; }
      66%  { color: #00f; text-shadow: 0 0 12px #00f; }
      83%  { color: #f0f; text-shadow: 0 0 12px #f0f; }
      100% { color: #f00; text-shadow: 0 0 12px #f00; }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div id="ui">
    <div id="header">
      <span><span id="score-label">SCORE </span><span id="score-val">0</span></span>
      <span><span id="level-label">LEVEL </span><span id="level-val">1</span></span>
      <span><span id="hi-label">HI-SCORE </span><span id="hi-val">0</span></span>
      <span><span id="lives-label">LIVES </span><span id="lives-val">♥♥♥</span></span>
    </div>

    <div style="position:relative;">
      <canvas id="gameCanvas" width="800" height="560"></canvas>
      <button id="mute-btn">♪ MUTE</button>
      <div id="overlay"></div>
    </div>

    <div id="footer">
      <span>← → MOVE &nbsp; SPACE FIRE &nbsp; P PAUSE</span>
      <span>© 1978 TAITO / TRIBUTE 2024</span>
    </div>
  </div>

  <script src="game.js?v=2"></script>
</body>
</html>
